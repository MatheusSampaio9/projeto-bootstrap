<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Landing Page Tailwind - WebSolutions</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

    <!-- Cabeçalho -->
    <header class="bg-white shadow">

        <nav class="container mx-auto flex justify-between items-center py-4 px-6">

            <a href="#" class="text-xl font-bold text-gray-800">
                WebSolutions
            </a>

        </nav>

    </header>

    <!-- Hero -->
    <main class="container mx-auto mt-10 px-6">

        <section class="text-center py-20 bg-white rounded-lg shadow-sm">

            <h1 class="text-4xl font-bold text-gray-800 mb-4">
                Bem-vindo à WebSolutions
            </h1>

            <p class="text-gray-600 text-lg mb-6">
                Soluções em desenvolvimento web para todos os tipos de negócios.
            </p>

            <button class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg transition">
                Saiba Mais
            </button>

        </section>

    </main>

</body>
</html>
